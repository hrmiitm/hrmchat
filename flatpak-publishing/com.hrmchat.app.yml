app-id: com.hrmchat.app
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '23.08'
command: hrmchat
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
modules:
  - name: hrmchat
    buildsystem: simple
    build-commands:
      - cp -r . /app/bin/hrmchat-app
      - install -Dm755 hrmchat.sh /app/bin/hrmchat
      - install -Dm644 com.hrmchat.app.desktop /app/share/applications/com.hrmchat.app.desktop
      - install -Dm644 com.hrmchat.app.metainfo.xml /app/share/metainfo/com.hrmchat.app.metainfo.xml
    sources:
      - type: archive
        url: file:///home/bitun/Documents/Jan2026/hrmchat/release/hrmchat-1.0.0-linux-x64.tar.gz
        sha256: 9b2f444d26c46a86ab487809db5d5baa97702eddc51e53edd786f158252ef872
      - type: file
        path: hrmchat.sh
      - type: file
        path: com.hrmchat.app.desktop
      - type: file
        path: com.hrmchat.app.metainfo.xml
